<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now Playing · Rice Shower</title>
  <style>
    /* ── Variables (same as main) ─────────────── */
    :root {
      --bg-void:      #04000d;
      --bg-deep:      #08001a;
      --bg-mid:       #0d0025;
      --bg-surface:   #140033;
      --glass:        rgba(180,120,255,0.05);
      --glass-bd:     rgba(180,120,255,0.15);
      --glass-bd-hov: rgba(180,120,255,0.35);
      --acc:          #c77dff;
      --acc-dim:      #9b59b6;
      --acc-bright:   #e0aaff;
      --acc-deep:     #6a0dad;
      --text-1:       #f0e6ff;
      --text-2:       #b8a8d8;
      --text-3:       #6a5a88;
      --text-inv:     #0a0018;
      --glow-sm:      0 0 12px rgba(199,125,255,0.28);
      --glow-md:      0 0 28px rgba(199,125,255,0.35), 0 0 55px rgba(199,125,255,0.12);
      --glow-lg:      0 0 45px rgba(199,125,255,0.45), 0 0 90px rgba(199,125,255,0.18);
      --f-display:    "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
      --f-body:       "Gill Sans","Gill Sans MT",Calibri,"Trebuchet MS",system-ui,sans-serif;
      --f-mono:       "Courier New",Courier,monospace;
      --ease:         cubic-bezier(0.4,0,0.2,1);
      --r:            16px;
    }

    /* Night Bloom */
    body.night-bloom {
      --acc:          #ff00cc;
      --acc-dim:      #cc00aa;
      --acc-bright:   #ff66ee;
      --glass-bd:     rgba(255,0,204,0.22);
      --glow-sm:      0 0 14px rgba(255,0,204,0.35);
      --glow-md:      0 0 28px rgba(255,0,204,0.45), 0 0 60px rgba(0,255,255,0.12);
      --glow-lg:      0 0 55px rgba(255,0,204,0.55), 0 0 110px rgba(0,255,255,0.18);
      --text-1:       #fff0ff;
      --text-2:       #ffaaee;
    }

    /* ── Reset ───────────────────────────────── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      background:var(--bg-void);
      color:var(--text-1);
      font-family:var(--f-body);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow-x:hidden;
      cursor:none;
    }
    a{text-decoration:none;color:inherit}

    /* ── Cursor ──────────────────────────────── */
    .cursor-glow{
      position:fixed;width:280px;height:280px;border-radius:50%;
      background:radial-gradient(circle,rgba(199,125,255,0.12) 0%,transparent 70%);
      pointer-events:none;transform:translate(-50%,-50%);
      z-index:9999;mix-blend-mode:screen;
      transition:left 0.08s,top 0.08s;
    }

    /* ── Particles ───────────────────────────── */
    .particles-canvas{
      position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.5;
    }

    /* ── Page bg ─────────────────────────────── */
    .page-bg{
      position:fixed;inset:0;z-index:0;
      background:
        radial-gradient(ellipse 80% 70% at 50% 50%,
          rgba(106,13,173,0.18) 0%,transparent 70%),
        var(--bg-void);
    }

    /* ── Back btn ────────────────────────────── */
    .back-btn{
      position:fixed;top:24px;left:28px;z-index:100;
      display:flex;align-items:center;gap:10px;
      padding:10px 20px;border-radius:50px;
      border:1px solid var(--glass-bd);
      background:rgba(4,0,13,0.6);
      backdrop-filter:blur(16px);
      font-size:0.78rem;letter-spacing:0.15em;
      text-transform:uppercase;color:var(--text-2);
      cursor:none;
      transition:all 0.3s var(--ease);
    }
    .back-btn:hover{
      color:var(--acc-bright);border-color:var(--acc);
      box-shadow:var(--glow-sm);
    }
    .back-btn svg{transition:transform 0.3s}
    .back-btn:hover svg{transform:translateX(-3px)}

    /* Night bloom btn */
    .bloom-fixed{
      position:fixed;top:24px;right:28px;z-index:100;
      width:36px;height:36px;border-radius:50%;
      border:1px solid var(--glass-bd);
      background:rgba(4,0,13,0.6);backdrop-filter:blur(16px);
      color:var(--acc);font-size:0.9rem;
      display:flex;align-items:center;justify-content:center;
      cursor:none;transition:all 0.3s var(--ease);
    }
    .bloom-fixed:hover,
    .bloom-fixed.active{
      border-color:var(--acc);background:rgba(199,125,255,0.15);
      box-shadow:var(--glow-sm);
    }

    /* ── Player Card ─────────────────────────── */
    .player-wrap{
      position:relative;z-index:1;
      width:min(420px,90vw);
      animation:fade-up 0.8s cubic-bezier(0,0,0.2,1) both;
    }
    @keyframes fade-up{
      from{opacity:0;transform:translateY(32px)}
      to{opacity:1;transform:none}
    }

    .player-eyebrow{
      text-align:center;
      font-family:var(--f-mono);
      font-size:0.66rem;letter-spacing:0.4em;
      text-transform:uppercase;
      color:var(--acc);opacity:0.7;
      margin-bottom:20px;
    }

    .player-card{
      background:var(--glass);
      border:1px solid var(--glass-bd);
      border-radius:var(--r);
      backdrop-filter:blur(28px) saturate(160%);
      box-shadow:0 16px 50px rgba(0,0,0,0.7),var(--glow-md);
      overflow:hidden;
      position:relative;
    }

    /* Top accent */
    .player-card::before{
      content:'';position:absolute;
      top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--acc),transparent);
      box-shadow:var(--glow-sm);
    }

    /* ── Cover ───────────────────────────────── */
    .cover-section{
      position:relative;
      width:100%;
      aspect-ratio:1;
      overflow:hidden;
    }

    .cover-img{
      position:absolute;inset:0;
      background-size:cover;background-position:center;
      background-color:var(--bg-surface);
      transition:transform 0.5s var(--ease);
    }
    .cover-img.playing{
      animation:cover-spin-slow 30s linear infinite;
    }
    @keyframes cover-spin-slow{
      /* Subtle breathing scale instead of actual rotation for rectangular images */
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.03)}
    }

    .cover-ph{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,var(--bg-surface),var(--bg-mid));
      font-size:5rem;color:rgba(199,125,255,0.12);
    }

    /* Gradient overlay on cover bottom */
    .cover-section::after{
      content:'';position:absolute;
      bottom:0;left:0;right:0;height:40%;
      background:linear-gradient(180deg,transparent,rgba(4,0,13,0.6));
      pointer-events:none;
    }

    /* Vinyl ring decoration */
    .cover-vinyl{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      width:60px;height:60px;
      border-radius:50%;
      border:2px solid rgba(199,125,255,0.12);
      pointer-events:none;
      opacity:0;
      transition:opacity 0.5s;
    }
    .cover-vinyl::after{
      content:'';position:absolute;
      top:50%;left:50%;transform:translate(-50%,-50%);
      width:14px;height:14px;border-radius:50%;
      background:rgba(199,125,255,0.2);
      border:1px solid var(--glass-bd);
    }
    .playing + .cover-vinyl { opacity:0.6; }

    /* ── Info ────────────────────────────────── */
    .player-info{
      padding:24px 28px 8px;
      display:flex;flex-direction:column;gap:4px;
    }

    .track-title{
      font-family:var(--f-display);
      font-size:1.45rem;font-weight:400;
      letter-spacing:0.03em;
      color:var(--text-1);
      text-shadow:var(--glow-sm);
      line-height:1.2;
    }

    .track-artist{
      font-size:0.82rem;color:var(--text-2);
      letter-spacing:0.06em;
    }

    .track-album{
      font-family:var(--f-mono);
      font-size:0.66rem;color:var(--acc);
      letter-spacing:0.2em;opacity:0.65;
    }

    /* ── Progress ────────────────────────────── */
    .progress-section{
      padding:20px 28px 0;
    }

    .progress-bar-wrap{
      position:relative;height:3px;
      background:rgba(255,255,255,0.06);
      border-radius:2px;
      cursor:pointer;
      margin-bottom:8px;
      overflow:visible;
    }
    .progress-bar-fill{
      height:100%;width:0%;
      background:linear-gradient(90deg,var(--acc-deep),var(--acc));
      border-radius:2px;
      box-shadow:0 0 8px var(--acc);
      transition:width 0.25s linear;
      position:relative;
    }
    .progress-bar-fill::after{
      content:'';position:absolute;
      right:-4px;top:50%;transform:translateY(-50%);
      width:10px;height:10px;border-radius:50%;
      background:var(--acc-bright);
      box-shadow:var(--glow-sm);
      opacity:0;transition:opacity 0.2s;
    }
    .progress-bar-wrap:hover .progress-bar-fill::after{opacity:1}

    .time-row{
      display:flex;justify-content:space-between;
      font-family:var(--f-mono);
      font-size:0.68rem;color:var(--text-3);
      letter-spacing:0.08em;
    }

    /* ── Controls ────────────────────────────── */
    .controls{
      padding:16px 28px 28px;
      display:flex;align-items:center;
      justify-content:center;
      gap:0;
    }

    .play-btn{
      width:64px;height:64px;border-radius:50%;
      border:none;
      background:linear-gradient(135deg,var(--acc-dim),var(--acc));
      color:var(--text-inv);
      display:flex;align-items:center;justify-content:center;
      cursor:none;
      box-shadow:var(--glow-md),0 4px 20px rgba(0,0,0,0.4);
      transition:all 0.3s var(--ease);
      position:relative;
      overflow:hidden;
    }
    .play-btn::before{
      content:'';position:absolute;inset:0;border-radius:50%;
      background:rgba(255,255,255,0.15);
      transform:scale(0);transition:transform 0.4s var(--ease);
    }
    .play-btn:hover::before{transform:scale(1)}
    .play-btn:hover{
      transform:scale(1.08);
      box-shadow:var(--glow-lg),0 8px 30px rgba(0,0,0,0.5);
    }
    .play-btn:active{transform:scale(0.96)}

    .play-btn svg{
      position:relative;z-index:1;
      transition:transform 0.2s var(--ease);
    }
    .play-btn.playing svg.icon-play{display:none}
    .play-btn svg.icon-pause{display:none}
    .play-btn.playing svg.icon-pause{display:block}

    /* Playing ring pulse */
    .play-btn.playing::after{
      content:'';position:absolute;inset:-4px;
      border-radius:50%;
      border:1px solid var(--acc);
      animation:ring-expand 1.5s ease-out infinite;
    }
    @keyframes ring-expand{
      0%{transform:scale(1);opacity:0.6}
      100%{transform:scale(1.5);opacity:0}
    }

    /* ── Equalizer bars (shows when playing) ─── */
    .eq-bars{
      display:flex;align-items:flex-end;
      gap:3px;height:20px;padding:0 28px 16px;
      justify-content:center;
      opacity:0;transition:opacity 0.4s;
    }
    .eq-bars.active{opacity:1}
    .eq-bar{
      width:3px;border-radius:2px;
      background:var(--acc);
      box-shadow:0 0 4px var(--acc);
      transform-origin:bottom;
    }
    .eq-bar:nth-child(1){animation:eq 0.7s -0.3s ease-in-out infinite alternate}
    .eq-bar:nth-child(2){animation:eq 0.5s -0.1s ease-in-out infinite alternate}
    .eq-bar:nth-child(3){animation:eq 0.9s -0.5s ease-in-out infinite alternate}
    .eq-bar:nth-child(4){animation:eq 0.6s -0.2s ease-in-out infinite alternate}
    .eq-bar:nth-child(5){animation:eq 0.8s -0.4s ease-in-out infinite alternate}
    @keyframes eq{
      from{height:4px}
      to{height:18px}
    }

    /* ── Footer label ────────────────────────── */
    .player-footer{
      text-align:center;margin-top:24px;
      font-family:var(--f-mono);
      font-size:0.62rem;letter-spacing:0.25em;
      color:var(--text-3);opacity:0.5;
    }

    /* Scrollbar */
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--bg-void)}
    ::-webkit-scrollbar-thumb{background:var(--acc-deep);border-radius:2px}
  </style>
</head>
<body>

  <div class="cursor-glow" id="cursorGlow"></div>
  <canvas class="particles-canvas" id="particlesCanvas"></canvas>
  <div class="page-bg"></div>

  <!-- Back button -->
  <a href="index.html" class="back-btn" id="backBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12,19 5,12 12,5"/>
    </svg>
    <span>Back</span>
  </a>

  <!-- Night bloom toggle -->
  <button class="bloom-fixed" id="bloomBtn" title="Night Bloom Mode">✦</button>

  <!-- ── PLAYER ── -->
  <div class="player-wrap">
    <p class="player-eyebrow">Uma Musume Pretty Derby · Now Playing</p>

    <div class="player-card">

      <!-- Cover Image -->
      <div class="cover-section">
        <div class="cover-img" id="coverImg">
          <!-- bg-image set by JS from track config -->
        </div>
        <div class="cover-ph" id="coverPh">♪</div>
        <div class="cover-vinyl" id="coverVinyl"></div>
      </div>

      <!-- Track Info -->
      <div class="player-info">
        <h1 class="track-title" id="trackTitle">Song Title Here</h1>
        <p class="track-artist" id="trackArtist">Rice Shower · CV. 石見舞菜香</p>
        <p class="track-album" id="trackAlbum">Uma Musume Pretty Derby</p>
      </div>

      <!-- Progress -->
      <div class="progress-section">
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span id="timeCurrent">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>

      <!-- EQ Bars -->
      <div class="eq-bars" id="eqBars">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="play-btn" id="playBtn" title="Play / Pause">
          <svg class="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="6,3 20,12 6,21"/>
          </svg>
          <svg class="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <rect x="5" y="3" width="4" height="18" rx="1"/>
            <rect x="15" y="3" width="4" height="18" rx="1"/>
          </svg>
        </button>
      </div>

    </div><!-- /player-card -->

    <p class="player-footer">✦ Rice Shower · Uma Musume Pretty Derby ✦</p>
  </div>

  <!-- Hidden audio element -->
  <audio id="playerAudio" preload="none"></audio>

  <script>
  'use strict';

  /* ─────────────────────────────────────────────
     TRACK CONFIG — Edit these to set your songs!
     Put your audio files in assets/audio/
     Put your cover images in assets/images/
  ──────────────────────────────────────────────*/
  const TRACKS = {
    1: {
      title:  'ウマすぎ！グルメパレード',
      artist: '『ウマ娘 プリティーダービー』WINNING LIVE 20',
      album:  'Uma Musume Pretty Derby',
      audio:  'assets/audio/song-1.mp3',        // ← path ke file lagu
      cover:  'assets/images/song-cover-1.jpg', // ← path ke cover
    },
    2: {
      title:  'ささやかな祈り',
      artist: 'Rice Shower · CV. 石見舞菜香',
      album:  'Uma Musume Pretty Derby',
      audio:  'assets/audio/song-2.mp3',
      cover:  'assets/images/song-cover-2.jpg',
    },
    3: {
      title:  'WINnin 5 -ウイニング☆ファ',
      artist: 'Rice Shower · CV. 石見舞菜香',
      album:  'Uma Musume Pretty Derby',
      audio:  'assets/audio/song-3.mp3',
      cover:  'assets/images/song-cover-3.jpg',
    },
  };

  /* ── Init ────────────────────────────────────*/
  document.addEventListener('DOMContentLoaded', () => {
    const params  = new URLSearchParams(location.search);
    const trackId = parseInt(params.get('track') || '1', 10);
    const track   = TRACKS[trackId] || TRACKS[1];

    loadTrack(track);
    initPlayer();
    initCursor();
    initParticles();
    initNightBloom();
  });

  /* ── Load Track ──────────────────────────────*/
  function loadTrack(track) {
    document.getElementById('trackTitle').textContent  = track.title;
    document.getElementById('trackArtist').textContent = track.artist;
    document.getElementById('trackAlbum').textContent  = track.album;

    const coverImg = document.getElementById('coverImg');
    coverImg.style.backgroundImage = `url('${track.cover}')`;
    coverImg.style.backgroundSize  = 'cover';
    coverImg.style.backgroundPosition = 'center';

    // Hide placeholder if cover loads
    const img = new Image();
    img.onload = () => { document.getElementById('coverPh').style.opacity = '0'; };
    img.src = track.cover;

    document.getElementById('playerAudio').src = track.audio;
  }

  /* ── Player Logic ────────────────────────────*/
  function initPlayer() {
    const audio    = document.getElementById('playerAudio');
    const playBtn  = document.getElementById('playBtn');
    const fill     = document.getElementById('progressFill');
    const wrap     = document.getElementById('progressWrap');
    const timeCur  = document.getElementById('timeCurrent');
    const timeDur  = document.getElementById('timeDuration');
    const eqBars   = document.getElementById('eqBars');
    const coverImg = document.getElementById('coverImg');

    function setPlaying(on) {
      playBtn.classList.toggle('playing', on);
      eqBars.classList.toggle('active', on);
      coverImg.classList.toggle('playing', on);
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play().catch(() => {});
        setPlaying(true);
      } else {
        audio.pause();
        setPlaying(false);
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      fill.style.width = pct + '%';
      timeCur.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      timeDur.textContent = fmt(audio.duration);
    });

    audio.addEventListener('ended', () => setPlaying(false));

    // Seek on click
    wrap.addEventListener('click', e => {
      if (!audio.duration) return;
      const rect = wrap.getBoundingClientRect();
      const pct  = (e.clientX - rect.left) / rect.width;
      audio.currentTime = pct * audio.duration;
    });
  }

  function fmt(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  /* ── Cursor ──────────────────────────────────*/
  function initCursor() {
    const glow = document.getElementById('cursorGlow');
    let mx = -300, my = -300, cx = -300, cy = -300;
    const lerp = (a,b,t) => a + (b-a)*t;
    function tick() {
      cx = lerp(cx, mx, 0.12); cy = lerp(cy, my, 0.12);
      glow.style.left = cx+'px'; glow.style.top = cy+'px';
      requestAnimationFrame(tick);
    }
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
    tick();
    document.querySelectorAll('a,button').forEach(el => {
      el.style.cursor = 'none';
      el.addEventListener('mouseenter', () => { glow.style.transform='translate(-50%,-50%) scale(1.5)'; });
      el.addEventListener('mouseleave', () => { glow.style.transform='translate(-50%,-50%) scale(1)'; });
    });
  }

  /* ── Particles (same as main) ────────────────*/
  function initParticles() {
    const canvas = document.getElementById('particlesCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const NORM  = ['#c77dff','#9b59b6','#e0aaff','#6a0dad','#ffffff'];
    const BLOOM = ['#ff00cc','#00ffff','#ff66ee','#66ffff'];
    const getC  = () => document.body.classList.contains('night-bloom') ? BLOOM : NORM;

    function mp() {
      const c = getC();
      return { x:Math.random()*W, y:H+10,
        vx:(Math.random()-.5)*.4, vy:-(0.25+Math.random()*.55),
        size:.5+Math.random()*1.5, alpha:.15+Math.random()*.5,
        life:0, maxLife:200+Math.random()*400,
        color:c[Math.floor(Math.random()*c.length)],
        twinkle:Math.random()*Math.PI*2, ts:.02+Math.random()*.04 };
    }

    for (let i=0;i<60;i++) { const p=mp(); p.y=Math.random()*H; p.life=Math.random()*p.maxLife; particles.push(p); }

    (function frame() {
      ctx.clearRect(0,0,W,H);
      particles.forEach((p,i) => {
        p.x += p.vx+Math.sin(p.life*.015)*.2; p.y+=p.vy; p.life++; p.twinkle+=p.ts;
        if (p.life>=p.maxLife||p.y<-10) { const f=mp(); particles[i]=f; return; }
        const a=p.alpha*Math.min(1,p.life/60)*Math.min(1,(p.maxLife-p.life)/60)*(0.7+0.3*Math.sin(p.twinkle));
        ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); ctx.restore();
      });
      requestAnimationFrame(frame);
    })();
  }

  /* ── Night Bloom ─────────────────────────────*/
  function initNightBloom() {
    const btn = document.getElementById('bloomBtn');
    const KEY = 'rs-nightbloom';

    function set(on) {
      document.body.classList.toggle('night-bloom', on);
      btn.classList.toggle('active', on);
      try { localStorage.setItem(KEY, on?'1':'0'); } catch(_){}
    }

    try { if (localStorage.getItem(KEY)==='1') set(true); } catch(_){}
    btn.addEventListener('click', () => set(!document.body.classList.contains('night-bloom')));
  }
